# Default prefix: Ctrl + B

# Enable true colors support
# set-option -g default-terminal "screen-256color"
# set-option -g default-shell $SHELL
# source-file ~/.tmux.conf

# Start plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '2'
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'
# End plugins

#set -g default-terminal "xterm-ghostty"
#set -g default-terminal "xterm-256color"
#set -ag terminal-overrides ",$TERM:RGB"
 set -g default-terminal "xterm-256color"
 set-option -ga terminal-overrides ",xterm-256color:Tc"

# Status bar
# Colors: bg=#1e1e2e, surface=#313244, overlay=#45475a, text=#cdd6f4, subtext=#a6adc8
# Accents: green=#3cb371, teal=#94e2d5, mauve=#cba6f7, blue=#89b4fa, peach=#fab387
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#3cb371"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#45475a,fg=#cdd6f4"

# Status left: session + hostname
set -g status-left-length 40
set -g status-left "#[fg=#1e1e2e,bg=#3cb371]  #S  "

# Status right: date + time
set -g status-right-length 40
set -g status-right "#[fg=#3cb371,bg=#313244]#[fg=#a6adc8,bg=#313244]  #H  #[fg=#313244,bg=#1e1e2e]#[fg=#3cb371,bg=#313244]#[fg=#1e1e2e,bg=#008080,bold]  %H:%M "

# Window status
set -g window-status-separator ""
set-window-option -g window-status-format "#[fg=#a6adc8,bg=#1e1e2e] #I:#W "
set-window-option -g window-status-current-format "#[fg=#1e1e2e,bg=#45475a]#[fg=#cdd6f4,bg=#45475a,bold] #I:#W #[fg=#45475a,bg=#1e1e2e]"
set-window-option -g window-status-activity-style "fg=#fab387"

# Basic configuration
setw -g mode-keys vi                    # Use vi keys in copy mode
setw -g monitor-activity on             # Monitor activity in all windows
setw -g mouse on                        # Enable mouse control

# Session management
bind s choose-tree -sZ -O name          # Sort sessions by name for selection (Default: Prefix + s -> choose-tree -Zs)
bind -n MouseDown1StatusLeft choose-tree -sZ -O name  # Click session name in status bar to open chooser

# Vim-style copy mode bindings
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel # Default: y (copy-mode-vi)
bind-key -T copy-mode-vi 'v' send -X begin-selection           # Default: v (also Space)

# Pane and window numbering
set -g base-index 1                     # Start window numbering at 1
setw -g pane-base-index 1               # Start pane numbering to align with window numbers
set -g renumber-windows on              # Renumber windows automatically when a window is closed
setw -g automatic-rename on             # Automatically rename windows to reflect the current program
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'
set-option -g allow-rename off
set-option -g status-interval 1
set-option -g window-status-format "#I:#W"
set-option -g window-status-current-format "#I:#W"
set-hook -g after-select-window 'run-shell "tmux set-window-option -t #{window_id} automatic-rename-format \"#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{?#{==:#{pane_current_command},bash},#{b:pane_current_path},#{pane_current_command}}}\""'


# Split windows and panes
bind - split-window -v                  # Horizontal split with '-' (Default: Prefix + ")
bind _ split-window -h                  # Vertical split with '_' (Default: Prefix + %)

# Resize panes interactively
bind -r H resize-pane -L 2              # Increase pane size to the left (Default: Prefix + M-Left or C-Left)
bind -r J resize-pane -D 2              # Increase pane size downwards (Default: Prefix + M-Down or C-Down)
bind -r K resize-pane -U 2              # Increase pane size upwards (Default: Prefix + M-Up or C-Up)
bind -r L resize-pane -R 2              # Increase pane size to the right (Default: Prefix + M-Right or C-Right)

# Focus events for Neovim
set-option -g focus-events on
set-option -sg escape-time 10

# Navigation
unbind h
unbind j
unbind k
unbind l
bind -r h select-pane -L                # Move to the left pane (Default: Prefix + Left)
bind -r j select-pane -D                # Move to the pane below (Default: Prefix + Down)
bind -r k select-pane -U                # Move to the pane above (Default: Prefix + Up)
bind -r l select-pane -R                # Move to the right pane (Default: Prefix + Right)
bind -r > swap-pane -D                  # Swap with the next pane (Default: Prefix + })
bind -r < swap-pane -U                  # Swap with the previous pane (Default: Prefix + {)
bind C-f command-prompt -p find-session 'switch-client -t %%'  # Find session with Ctrl + F (Default: not bound)
bind -r C-h previous-window             # Move to the previous window (Default: Prefix + p)
bind -r C-l next-window                 # Move to the next window (Default: Prefix + n)
bind -r Tab last-window                 # Toggle between the last active windows (Default: Prefix + l)

# Quick window select (Default: Prefix + 1..9)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
