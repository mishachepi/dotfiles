[colors.selection]
background = "0x2d4f67"
foreground = "0xc8c093"

[[colors.indexed_colors]]
index = 16
color = "0xffa066"

[[colors.indexed_colors]]
index = 17
color = "0xff5d62"

[font]
size = 17

  [font.normal]
  family = "SauceCodePro Nerd Font"
  style = "Regular"

  [font.bold]
  family = "SauceCodePro Nerd Font"
  style = "Bold"

  [font.italic]
  family = "SauceCodePro Nerd Font"
  style = "Italic"

[keyboard]
bindings = [
{ key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
{ key = "L", mods = "Control|Shift", chars = "l" },
]

[window.dimensions]
columns = 85
lines = 35

