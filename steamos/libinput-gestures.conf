# libinput-gestures config — macOS-like trackpad gestures for KDE on X11
# 3-finger swipe left/right = switch desktops
# 3-finger swipe up = KDE Overview (all windows)
# 3-finger swipe down = show desktop

gesture swipe left  3 qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Switch One Desktop to the Right"
gesture swipe right 3 qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Switch One Desktop to the Left"
gesture swipe up    3 qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Overview"
gesture swipe down  3 qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Show Desktop"

gesture swipe left  4 qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Switch One Desktop to the Right"
gesture swipe right 4 qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Switch One Desktop to the Left"
gesture swipe up    4 qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Overview"
gesture swipe down  4 qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Show Desktop"
